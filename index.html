<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- font family -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<!-- tainwind css -->

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- <style>
   body{
    background-color: red !important;
    font-family: "Geist", sans-serif;
}
   
</style> -->

</head>
<body class="bg-[#F8FAFC] min-h-screen flex justify-center items-center">
    
  <div class="login-info bg-white pt-8 w-9/12 md:w-3/12 mx-auto rounded-[11px]  shadow-md  al">
   <div class="text">
            <img class="mx-auto w-15" src="assets/github-logo.png" alt="">
            <h3 class="text-center font-bold text-2xl mt-1">GitHub Issues Tracker</h3>
            <p class="text-center">Sign in to manage your issues</p>
           </div>

           <div class="from">
            <fieldset class="fieldset   rounded-box w-full  p-4">
  

  <label class="label text-black font-bold">Username</label>
  <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
  <p class="text-[#4A00FF] pb-3">Default: admin</p>

  <label class="label text-black font-bold">Password</label>
  <input id="pinnum" type="password" class="input w-full" placeholder="Enter Password" />
    <p class="text-[#4A00FF] pb-1">Default: admin123</p>


  <button id="login-btn" class="btn  mt-4 bg-[#4A00FF] text-white rounded-[8px]">Sign In</button>
             </fieldset>

             <p class="text-center">OR</p>
           <p class="text-center text-gray-500">Demo Credentials: </p>
          


        <div class="bg-[#F8FAFC] w-11/12 mx-auto m-3 py-6 ">

       <p class="text-center font-bold">Username: <span class="font-normal">admin</span> </p>
        <p class="text-center font-bold">Password: <span class="font-normal">admin123</span> </p>

           </div>

   </div>

<script src="scipt/index.js"></script>

</body>
</html>
